# Пример nginx-конфига для проекта pogoda (домен pogoda.example.com).
# На сервере положить в /etc/nginx/conf.d/pogoda.example.com.conf.
#
# Бэкенд — Next.js standalone под pm2 (процесс «pogoda»), слушает 127.0.0.1:3109.
# TLS — замени пути ssl_certificate / ssl_certificate_key на свои сертификаты.

# ─── upstream ──────────────────────────────────────────────────────────────────
upstream pogoda_app {
  server 127.0.0.1:3109;
  keepalive 32;
}

# ─── HTTP → HTTPS ──────────────────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name pogoda.example.com;

  return 301 https://$host$request_uri;
}

# ─── HTTPS ─────────────────────────────────────────────────────────────────────
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name pogoda.example.com;

  # Подставь свои сертификаты (Let's Encrypt, wildcard и т. д.)
  ssl_certificate     /etc/nginx/ssl/example.com/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/example.com/privkey.pem;

  # Логи отдельно от общего access.log — удобно для grep
  access_log /var/log/nginx/pogoda.access.log;
  error_log  /var/log/nginx/pogoda.error.log;

  # Безопасные заголовки
  add_header X-Frame-Options           "SAMEORIGIN" always;
  add_header X-Content-Type-Options    "nosniff"    always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Размер тела запроса — для возможных upload'ов
  client_max_body_size 10m;

  # gzip — Next.js отдаёт уже сжатую статику в .next/static, но HTML и JSON
  # пусть жмёт nginx.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  # ─── Статика Next.js — иммутабельная, кэш на год ─────────────────────────────
  location /_next/static/ {
    proxy_pass http://pogoda_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_cache_valid 200 365d;
    expires 365d;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # ─── Public-файлы (favicon, robots, og-картинки) ─────────────────────────────
  location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml|.*\.(png|jpg|jpeg|gif|svg|webp|woff2?))$ {
    proxy_pass http://pogoda_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    expires 30d;
    access_log off;
    add_header Cache-Control "public, max-age=2592000";
  }

  # ─── Всё остальное → Next.js ─────────────────────────────────────────────────
  location / {
    proxy_pass http://pogoda_app;
    proxy_http_version 1.1;

    # WebSocket / HMR / SSE — на всякий случай
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    # Стандартные прокси-заголовки
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Таймауты — Open-Meteo иногда отвечает медленно при cold-cache
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Не буферизуем — для streaming-ответов Next.js (RSC)
    proxy_buffering off;
    proxy_request_buffering off;
  }
}
